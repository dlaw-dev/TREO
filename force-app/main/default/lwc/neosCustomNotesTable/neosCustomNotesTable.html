<template>
    <lightning-card>

        <!-- 🔷 HEADER -->
        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-p-horizontal_small slds-m-bottom_small">

            <!-- LEFT: Icon + Title -->
            <div class="slds-media slds-media_center">
                <lightning-icon
                    icon-name="custom:custom46"
                    size="small"
                    class="slds-m-right_x-small">
                </lightning-icon>

                <div class="slds-text-heading_small">
                    Notes ({displayNotes.length})
                </div>
            </div>

            <!-- RIGHT: ALL CONTROLS INLINE -->
            <div class="slds-grid slds-grid_vertical-align-center">

                <!-- Pagination -->
                <template if:true={hasMultiplePages}>
                    <div class="slds-grid slds-grid_align-center slds-grid_vertical-align-center slds-m-right_large" style="min-width: 300px;">
                        <lightning-button 
                            label="Prev"
                            onclick={handlePrevPage}
                            disabled={isPrevDisabled}
                            class="slds-m-right_x-small">
                        </lightning-button>

                        <span class="slds-m-horizontal_small">
                            Page {currentPage} of {totalPages}
                        </span>

                        <lightning-button 
                            label="Next"
                            onclick={handleNextPage}
                            disabled={isNextDisabled}
                            class="slds-m-left_x-small">
                        </lightning-button>
                    </div>
                </template>

                <!-- 🔍 Search -->
                <div class="slds-m-right_large">
                    <lightning-input
                        type="search"
                        variant="label-hidden"
                        placeholder="Search notes..."
                        onchange={handleSearch}
                        style="width: 200px;">
                    </lightning-input>
                </div>

                <!-- Sort -->
                <div class="slds-grid slds-grid_vertical-align-center slds-align_absolute-center slds-m-right_large">
                    <span class="slds-m-right_x-small">Sort</span>

                    <lightning-input
                        class="fix-toggle"
                        type="toggle"
                        variant="label-hidden"
                        message-toggle-inactive="Pinned"
                        message-toggle-active="Date"
                        checked={isChronological}
                        onchange={handleToggleMode}>
                    </lightning-input>
                </div>

                <!-- Page Size -->
                <div class="slds-grid slds-grid_vertical-align-center slds-align_absolute-center slds-m-right_large">
                    <span class="slds-m-right_x-small">Per page</span>

                    <lightning-combobox
                        variant="label-hidden"
                        value={pageSize}
                        options={pageSizeOptions}
                        onchange={handlePageSizeChange}
                        style="width: 80px;">
                    </lightning-combobox>
                </div>

                <!-- Refresh -->
                <div class="slds-m-right_small slds-align_absolute-center">
                    <lightning-button-icon
                        icon-name="utility:refresh"
                        variant="border-filled"
                        alternative-text="Refresh"
                        onclick={handleRefresh}>
                    </lightning-button-icon>
                </div>

                <!-- New Note -->
                <div>
                    <lightning-button label="New Note" variant="brand" onclick={openFlow}></lightning-button>
                </div>

            </div>
        </div>

        <!-- Flow Modal -->
        <template if:true={isFlowOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container" style="width: 60%; max-width: 60%;">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={closeFlow} title="Close">
                            <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">New Note</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-flow
                            flow-api-name="Create_Custom_Note_Flow_NEOS_Matter"
                            flow-input-variables={flowInputVariables}
                            onstatuschange={handleFlowStatusChange}>
                        </lightning-flow>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- 🔽 TABLE -->
        <div class="slds-scrollable_x" style="max-width: 1600px; margin: auto;">
            <table class="slds-table slds-table_cell-buffer slds-table_bordered notes-table" style="min-width: 1000px;">
                <thead>
                    <tr class="slds-line-height_reset">
                        <th scope="col" style="width: 50px; text-align: center;">📌</th>
                        <th class="slds-text-title_caps" scope="col" style="width: 200px;">Date</th>
                        <th class="slds-text-title_caps" scope="col" style="width: 120px;">Staff</th>
                        <th class="slds-text-title_caps" scope="col" style="width: 180px;">Note Category</th>
                        <th class="slds-text-title_caps" scope="col">Note Description</th>
                        <th scope="col" style="width: 80px;"></th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={paginatedNotes} for:item="note">
                        <tr key={note.Id} class="slds-hint-parent">
                            <td data-label="Pinned" class="slds-text-align_center">{note.PinnedIcon}</td>
                            <td data-label="Date">
                                <lightning-formatted-date-time
                                    value={note.NEOS_Created_Date__c}
                                    year="numeric"
                                    month="short"
                                    day="numeric"
                                    hour="2-digit"
                                    minute="2-digit">
                                </lightning-formatted-date-time>
                            </td>
                            <td data-label="Staff">{note.StaffName}</td>
                            <td data-label="Note Category">{note.Note_Category__c}</td>
                            <td data-label="Note Description" class="note-description-cell">
                                <lightning-formatted-rich-text value={note.Note_Description__c}></lightning-formatted-rich-text>
                            </td>
                            <td class="slds-text-align_right">
                                <lightning-button
                                    label="View"
                                    data-id={note.Id}
                                    onclick={handleViewClick}>
                                </lightning-button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- 🔽 BOTTOM PAGINATION -->
        <template if:true={hasMultiplePages}>
            <div class="slds-grid slds-grid_align-center slds-grid_vertical-align-center slds-p-horizontal_small slds-m-top_small" style="min-width: 300px;">

                <lightning-button 
                    label="Prev"
                    onclick={handlePrevPage}
                    disabled={isPrevDisabled}
                    class="slds-m-right_small">
                </lightning-button>

                <span class="slds-m-right_small">
                    Page {currentPage} of {totalPages}
                </span>

                <lightning-button 
                    label="Next"
                    onclick={handleNextPage}
                    disabled={isNextDisabled}>
                </lightning-button>

            </div>
        </template>

        <!-- ❌ Error -->
        <template if:true={errorMessage}>
            <p class="slds-text-color_error slds-p-around_small">
                Error loading notes: {errorMessage}
            </p>
        </template>

    </lightning-card>
</template>

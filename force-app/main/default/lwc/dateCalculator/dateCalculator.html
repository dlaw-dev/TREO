<template>
    <lightning-card title="Date Calculator" icon-name="standard:event">
        <div class="slds-p-around_medium">

            <lightning-tabset>

                <!-- ── ADD TO DATE ───────────────────────────────────────── -->
                <lightning-tab label="Add Calendar Days">
                    <div class="tab-body">
                        <lightning-input type="date" label="Start Date" value={startDate} onchange={handleStartDate}></lightning-input>

                        <div class="slds-m-top_medium">
                            <div class="slds-text-title_caps slds-m-bottom_x-small">All Deadlines</div>
                            <table class="deadline-table">
                                <thead>
                                    <tr>
                                        <th>Period</th>
                                        <th>Date</th>
                                        <th>Day</th>
                                        <th>From Today</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={deadlineRows} for:item="row">
                                        <tr key={row.label} class={row.rowClass}>
                                            <td class="col-label">{row.label}</td>
                                            <td class="col-date">{row.dateStr}</td>
                                            <td class="col-dow">{row.dow}</td>
                                            <td class="col-days">{row.daysLabel}</td>
                                            <td class="col-action">
                                                <template if:true={row.isWeekend}>
                                                    <span title={row.weekendNote}>⚠️</span>
                                                </template>
                                                <template if:true={row.holidayName}>
                                                    <span title={row.holidayName}>🏛️</span>
                                                </template>
                                                <button class="copy-sm" data-text={row.copyStr} onclick={handleRowCopy} title="Copy date">⎘</button>
                                            </td>
                                        </tr>
                                        <template if:true={row.isWeekend}>
                                            <tr key={row.wkKey} class="weekend-note-row">
                                                <td colspan="5" class="weekend-note">{row.weekendNote}</td>
                                            </tr>
                                        </template>
                                        <template if:true={row.holidayName}>
                                            <tr key={row.holidayKey} class="holiday-note-row">
                                                <td colspan="5" class="holiday-note">🏛️ {row.holidayName}</td>
                                            </tr>
                                        </template>
                                    </template>
                                </tbody>
                            </table>
                        </div>

                        <div class="slds-m-top_large">
                            <div class="slds-text-title_caps slds-m-bottom_small">Custom</div>
                            <div class="slds-grid slds-gutters_small">
                                <div class="slds-col">
                                    <lightning-input type="number" label="Years"  value={addYears}  onchange={handleYears}></lightning-input>
                                </div>
                                <div class="slds-col">
                                    <lightning-input type="number" label="Months" value={addMonths} onchange={handleMonths}></lightning-input>
                                </div>
                                <div class="slds-col">
                                    <lightning-input type="number" label="Days"   value={addDays}   onchange={handleDays}></lightning-input>
                                </div>
                            </div>
                            <template if:true={customResult}>
                                <div class="result-box slds-m-top_medium">
                                    <div class="result-date">{customResult.dateStr}</div>
                                    <div class="result-sub">{customResult.dow} &middot; {customResult.daysLabel}</div>
                                    <template if:true={customResult.isWeekend}>
                                        <div class="result-weekend">{customResult.weekendNote}</div>
                                    </template>
                                    <template if:true={customResult.holidayName}>
                                        <div class="result-holiday">🏛️ {customResult.holidayName}</div>
                                    </template>
                                    <button class="copy-btn slds-m-top_small" onclick={handleCopy}>{copyLabel}</button>
                                </div>
                            </template>
                        </div>
                    </div>
                </lightning-tab>

                <!-- ── DAYS BETWEEN ──────────────────────────────────────── -->
                <lightning-tab label="Days Between">
                    <div class="tab-body">
                        <div class="slds-grid slds-gutters_small">
                            <div class="slds-col">
                                <lightning-input type="date" label="Start Date" value={countStart} onchange={handleCountStart}></lightning-input>
                            </div>
                            <div class="slds-col">
                                <lightning-input type="date" label="End Date" value={countEnd} onchange={handleCountEnd}></lightning-input>
                            </div>
                        </div>
                        <div class="slds-m-top_small">
                            <lightning-input
                                type="toggle"
                                label="Court days only"
                                checked={businessDaysOnly}
                                onchange={handleBusinessDaysToggle}>
                            </lightning-input>
                        </div>
                        <template if:true={daysBetweenResult}>
                            <template if:false={businessDaysOnly}>
                                <div class="result-box slds-m-top_medium">
                                    <div class="result-date">{daysBetweenResult.totalDays} days</div>
                                    <div class="result-sub slds-m-top_x-small">{daysBetweenResult.weeksLine}</div>
                                    <div class="result-sub">{daysBetweenResult.monthsLine}</div>
                                    <div class="result-sub">{daysBetweenResult.yearsLine}</div>
                                </div>
                            </template>
                            <template if:true={businessDaysOnly}>
                                <div class="result-box slds-m-top_medium">
                                    <div class="result-date">{daysBetweenResult.workdays} court days</div>
                                    <div class="result-sub">{daysBetweenResult.totalDays} calendar days total</div>
                                </div>
                            </template>
                        </template>
                    </div>
                </lightning-tab>

                <!-- ── ADD COURT DAYS ────────────────────────────────────── -->
                <lightning-tab label="Add Court Days">
                    <div class="tab-body">
                        <lightning-input type="date" label="Start Date" value={awStart} onchange={handleAwStart}></lightning-input>
                        <div class="slds-m-top_small">
                            <lightning-input type="number" label="Court Days to Add" min="1" value={awDays} onchange={handleAwDays}></lightning-input>
                        </div>
                        <template if:true={addWorkdaysResult}>
                            <div class="result-box slds-m-top_medium">
                                <div class="result-date">{addWorkdaysResult.dateStr}</div>
                                <div class="result-sub">{addWorkdaysResult.dow} &middot; {addWorkdaysResult.daysLabel}</div>
                                <template if:true={addWorkdaysResult.isWeekend}>
                                    <div class="result-weekend">{addWorkdaysResult.weekendNote}</div>
                                </template>
                                <template if:true={addWorkdaysResult.holidayName}>
                                    <div class="result-holiday">🏛️ {addWorkdaysResult.holidayName}</div>
                                </template>
                            </div>
                        </template>
                    </div>
                </lightning-tab>

                <!-- ── DAY OF WEEK ────────────────────────────────────────── -->
                <lightning-tab label="Day of Week">
                    <div class="tab-body">
                        <lightning-input type="date" label="Date" value={weekdayDate} onchange={handleWeekdayDate}></lightning-input>
                        <template if:true={weekdayResult}>
                            <div class="result-box slds-m-top_medium">
                                <div class="result-date">{weekdayResult.dow}</div>
                                <div class="result-sub">{weekdayResult.dateStr}</div>
                                <div class="result-sub">{weekdayResult.daysLabel}</div>
                                <template if:true={weekdayResult.holidayName}>
                                    <div class="result-holiday">🏛️ {weekdayResult.holidayName}</div>
                                </template>
                            </div>
                        </template>
                    </div>
                </lightning-tab>

                <!-- ── WEEK NUMBER ────────────────────────────────────────── -->
                <lightning-tab label="Week Number">
                    <div class="tab-body">
                        <lightning-input type="date" label="Date" value={weekNumDate} onchange={handleWeekNumDate}></lightning-input>
                        <template if:true={weekNumResult}>
                            <div class="result-box slds-m-top_medium">
                                <div class="result-date">Week {weekNumResult.weekNum}</div>
                                <div class="result-sub">{weekNumResult.year}</div>
                                <div class="result-sub">{weekNumResult.range}</div>
                                <template if:true={weekNumResult.holidayName}>
                                    <div class="result-holiday">🏛️ {weekNumResult.holidayName}</div>
                                </template>
                            </div>
                        </template>
                    </div>
                </lightning-tab>

            </lightning-tabset>
        </div>
    </lightning-card>
</template>

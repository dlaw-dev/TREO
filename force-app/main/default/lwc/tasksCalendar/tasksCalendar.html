<template>
  <lightning-card>
    <!-- Header -->
    <div
      slot="title"
      class="slds-grid slds-grid_align-spread slds-p-horizontal_medium slds-p-vertical_xx-small"
    >
      <span
        class="slds-align-middle"
        style="display: flex; align-items: center;"
      >
        <lightning-icon
          icon-name="standard:task"
          size="small"
          class="slds-m-right_small"
        ></lightning-icon>
        <span>Tasks</span>
        <template if:true={hasProgress}>
          <span class="tasks-progress-badge">{progressLabel}</span>
        </template>
      </span>

      <div
        class="slds-grid slds-grid_vertical-align-center slds-m-left_x-large"
        style="margin-left: 1.5rem;"
      >
        <lightning-button
          variant="brand"
          label="New Task"
          title="New Task"
          onclick={handleNewTask}
          size="small">
        </lightning-button>

        <div class="slds-m-left_small slds-align_absolute-center">
          <lightning-button-icon
            icon-name="utility:refresh"
            variant="border-filled"
            alternative-text="Refresh"
            onclick={handleRefresh}>
          </lightning-button-icon>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <lightning-tabset variant="scoped">

      <!-- All Tasks -->
      <lightning-tab label={allTabLabel}>
        <template if:true={isLoading}>
          <lightning-spinner alternative-text="Loading tasks" size="medium"></lightning-spinner>
        </template>
        <template if:true={hasError}>
          <p class="tasks-error">{errorMessage}</p>
        </template>
        <template if:false={isLoading}>
          <template if:false={hasError}>
            <template if:true={hasAllTasks}>
              <lightning-datatable
                key-field="Id"
                data={allTasksSorted}
                columns={columns}
                hide-checkbox-column
                onrowaction={handleRowAction}
                density="compact">
              </lightning-datatable>
            </template>
            <template if:false={hasAllTasks}>
              <p class="tasks-empty">No tasks yet on this Matter.</p>
            </template>
          </template>
        </template>
      </lightning-tab>

      <!-- Upcoming -->
      <lightning-tab label={upcomingTabLabel}>
        <template if:true={isLoading}>
          <lightning-spinner alternative-text="Loading tasks" size="medium"></lightning-spinner>
        </template>
        <template if:true={hasError}>
          <p class="tasks-error">{errorMessage}</p>
        </template>
        <template if:false={isLoading}>
          <template if:false={hasError}>
            <template if:true={hasUpcomingTasks}>
              <lightning-datatable
                key-field="Id"
                data={upcomingTasksSorted}
                columns={columns}
                hide-checkbox-column
                onrowaction={handleRowAction}
                density="compact">
              </lightning-datatable>
            </template>
            <template if:false={hasUpcomingTasks}>
              <p class="tasks-empty">No upcoming tasks.</p>
            </template>
          </template>
        </template>
      </lightning-tab>

      <!-- Past -->
      <lightning-tab label={pastTabLabel}>
        <template if:true={isLoading}>
          <lightning-spinner alternative-text="Loading tasks" size="medium"></lightning-spinner>
        </template>
        <template if:true={hasError}>
          <p class="tasks-error">{errorMessage}</p>
        </template>
        <template if:false={isLoading}>
          <template if:false={hasError}>
            <template if:true={hasPastTasks}>
              <lightning-datatable
                key-field="Id"
                data={pastTasksSorted}
                columns={columns}
                hide-checkbox-column
                onrowaction={handleRowAction}
                density="compact">
              </lightning-datatable>
            </template>
            <template if:false={hasPastTasks}>
              <p class="tasks-empty">No past-due tasks.</p>
            </template>
          </template>
        </template>
      </lightning-tab>

      <!-- No Deadline -->
      <lightning-tab label={noDeadlineTabLabel}>
        <template if:true={isLoading}>
          <lightning-spinner alternative-text="Loading tasks" size="medium"></lightning-spinner>
        </template>
        <template if:true={hasError}>
          <p class="tasks-error">{errorMessage}</p>
        </template>
        <template if:false={isLoading}>
          <template if:false={hasError}>
            <template if:true={hasNoDeadlineTasks}>
              <lightning-datatable
                key-field="Id"
                data={tasksNoDeadline}
                columns={columns}
                hide-checkbox-column
                onrowaction={handleRowAction}
                density="compact">
              </lightning-datatable>
            </template>
            <template if:false={hasNoDeadlineTasks}>
              <p class="tasks-empty">Every task has a due date.</p>
            </template>
          </template>
        </template>
      </lightning-tab>

      <!-- Completed -->
      <lightning-tab label={completedTabLabel}>
        <template if:true={isLoading}>
          <lightning-spinner alternative-text="Loading tasks" size="medium"></lightning-spinner>
        </template>
        <template if:true={hasError}>
          <p class="tasks-error">{errorMessage}</p>
        </template>
        <template if:false={isLoading}>
          <template if:false={hasError}>
            <template if:true={hasCompletedTasks}>
              <lightning-datatable
                key-field="Id"
                data={completedTasksSorted}
                columns={columns}
                hide-checkbox-column
                onrowaction={handleRowAction}
                density="compact">
              </lightning-datatable>
            </template>
            <template if:false={hasCompletedTasks}>
              <p class="tasks-empty">No completed tasks yet.</p>
            </template>
          </template>
        </template>
      </lightning-tab>

    </lightning-tabset>
  </lightning-card>
</template>

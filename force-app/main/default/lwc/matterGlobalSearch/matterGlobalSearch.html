<template>
    <lightning-card title="Matter Search" icon-name="utility:search">
        <div class="slds-p-horizontal_medium slds-p-bottom_x-small">
            <lightning-input
                type="search"
                label="Search"
                variant="label-hidden"
                placeholder="Search notes, time entries, events, parties..."
                value={searchTerm}
                onchange={handleSearch}
            ></lightning-input>
        </div>

        <template if:true={isLoading}>
            <div class="slds-align_absolute-center slds-p-around_medium">
                <lightning-spinner alternative-text="Searching..." size="small"></lightning-spinner>
            </div>
        </template>

        <template if:true={showTypeFilter}>
            <div class="filter-bar slds-p-horizontal_medium slds-p-bottom_x-small">
                <lightning-combobox
                    label="Filter by type"
                    variant="label-hidden"
                    value={selectedType}
                    options={filterOptions}
                    onchange={handleTypeFilter}
                    dropdown-alignment="left"
                ></lightning-combobox>
            </div>
        </template>

        <template if:true={hasResults}>
            <div class="results-scroll slds-p-horizontal_medium slds-p-bottom_medium">
                <template for:each={groupedResults} for:item="group">
                    <div key={group.type} class="result-group">
                        <div class="group-header">
                            <lightning-icon icon-name={group.iconName} size="x-small"></lightning-icon>
                            <span class="slds-m-left_x-small slds-text-title_caps">{group.label}</span>
                            <span class="result-count slds-m-left_x-small">{group.count}</span>
                        </div>
                        <!-- Columnar layout for objects with defined column config -->
                        <template if:true={group.hasColumns}>
                            <div class={group.headerClass} aria-hidden="true">
                                <span class="col-hdr">Name</span>
                                <template for:each={group.columns} for:item="col">
                                    <span key={col.label} class="col-hdr">{col.label}</span>
                                </template>
                            </div>
                            <template for:each={group.results} for:item="result">
                                <div
                                    key={result.id}
                                    class={result.rowClass}
                                    data-id={result.id}
                                    data-type={result.objectType}
                                    onclick={handleResultClick}
                                    role="button"
                                    tabindex="0"
                                >
                                    <span class="result-title">{result.title}</span>
                                    <template for:each={result.cells} for:item="cell">
                                        <span key={cell.label} class="result-cell">{cell.value}</span>
                                    </template>
                                </div>
                            </template>
                        </template>

                        <!-- Simple stacked layout for generic objects -->
                        <template if:true={group.hasNoColumns}>
                            <template for:each={group.results} for:item="result">
                                <div
                                    key={result.id}
                                    class="result-item"
                                    data-id={result.id}
                                    data-type={result.objectType}
                                    onclick={handleResultClick}
                                    role="button"
                                    tabindex="0"
                                >
                                    <div class="result-title">{result.title}</div>
                                </div>
                            </template>
                        </template>
                    </div>
                </template>
            </div>
        </template>

        <template if:true={noResults}>
            <div class="slds-align_absolute-center slds-p-around_medium">
                <p class="slds-text-color_weak">No results found for &ldquo;{searchTerm}&rdquo;</p>
            </div>
        </template>

        <template if:true={showPrompt}>
            <div class="slds-align_absolute-center slds-p-around_medium">
                <p class="slds-text-color_weak">Type at least 3 characters to search</p>
            </div>
        </template>
    </lightning-card>
</template>

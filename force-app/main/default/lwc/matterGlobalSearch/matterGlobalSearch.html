<template>
    <div class="search-card">

        <!-- Header -->
        <div class="search-header">
            <div class="search-header-top">
                <span class="search-title">Matter Search</span>
                <template if:true={hasResults}>
                    <span class="total-badge">{totalCount}</span>
                </template>
            </div>
            <div class="search-input-wrap">
                <lightning-input
                    type="search"
                    label="Search"
                    variant="label-hidden"
                    placeholder="Search anything related to this matter..."
                    value={searchTerm}
                    onchange={handleSearch}
                ></lightning-input>
            </div>
        </div>

        <!-- Loading spinner (search or browse) -->
        <template if:true={anyLoading}>
            <div class="state-center">
                <lightning-spinner alternative-text="Loading..." size="small"></lightning-spinner>
                <p class="state-subtext">{loadingText}</p>
            </div>
        </template>

        <!-- Filter pills (search mode only) -->
        <template if:true={showTypeFilter}>
            <div class="filter-pills">
                <template for:each={filterOptions} for:item="filter">
                    <button
                        key={filter.value}
                        class={filter.pillClass}
                        data-value={filter.value}
                        onclick={handleTypeFilter}
                    >
                        {filter.label}
                        <span class="pill-count">{filter.count}</span>
                    </button>
                </template>
            </div>
        </template>

        <!-- Browse mode bar -->
        <template if:true={isInBrowseMode}>
            <div class="browse-bar">
                <button class="back-btn" onclick={handleBackToSearch}>
                    <lightning-icon icon-name="utility:chevronleft" size="x-small" class="back-icon"></lightning-icon>
                    Back
                </button>
                <span class="browse-label">All {browseLabel}</span>
                <template if:true={hasResults}>
                    <span class="total-badge">{totalCount}</span>
                </template>
            </div>
        </template>

        <!-- Results (search + browse share this section) -->
        <template if:true={hasResults}>
            <div class="results-scroll">
                <template for:each={groupedResults} for:item="group">
                    <div key={group.type} class="result-group" data-type={group.type}>
                        <div class="group-header">
                            <lightning-icon icon-name={group.iconName} size="x-small"></lightning-icon>
                            <span class="group-label">{group.label}</span>
                            <span class="result-count">{group.count}</span>
                        </div>

                        <template if:true={group.hasColumns}>
                            <div class={group.headerClass} aria-hidden="true">
                                <span class="col-hdr">{group.titleLabel}</span>
                                <template for:each={group.columns} for:item="col">
                                    <span key={col.label} class="col-hdr">{col.label}</span>
                                </template>
                            </div>
                            <template for:each={group.results} for:item="result">
                                <div
                                    key={result.id}
                                    class={result.rowClass}
                                    data-id={result.id}
                                    data-type={result.objectType}
                                    onclick={handleResultClick}
                                    role="button"
                                    tabindex="0"
                                >
                                    <span class="result-title">{result.title}</span>
                                    <template for:each={result.cells} for:item="cell">
                                        <span key={cell.label} class="result-cell">{cell.value}</span>
                                    </template>
                                </div>
                            </template>
                        </template>

                        <template if:true={group.hasNoColumns}>
                            <template for:each={group.results} for:item="result">
                                <div
                                    key={result.id}
                                    class="result-item"
                                    data-id={result.id}
                                    data-type={result.objectType}
                                    onclick={handleResultClick}
                                    role="button"
                                    tabindex="0"
                                >
                                    <div class="result-title">{result.title}</div>
                                </div>
                            </template>
                        </template>
                    </div>
                </template>
            </div>
        </template>

        <!-- Browse empty -->
        <template if:true={showBrowseEmpty}>
            <div class="state-center">
                <div class="empty-icon-wrap">
                    <lightning-icon icon-name="utility:layers" size="medium"></lightning-icon>
                </div>
                <p class="state-heading">No {browseLabel} on this matter</p>
                <p class="state-subtext">Nothing has been added yet</p>
            </div>
        </template>

        <!-- No results (search mode) -->
        <template if:true={noResults}>
            <div class="state-center">
                <div class="empty-icon-wrap">
                    <lightning-icon icon-name="utility:search" size="medium"></lightning-icon>
                </div>
                <p class="state-heading">No results for &ldquo;{searchTerm}&rdquo;</p>
                <p class="state-subtext">Try different keywords or check spelling</p>
            </div>
        </template>

        <!-- Prompt / idle state -->
        <template if:true={showPrompt}>
            <div class="state-center prompt-state">
                <span class="prompt-icon-glow">
                    <div class="prompt-icon-wrap">
                        <lightning-icon icon-name="utility:search" size="large"></lightning-icon>
                    </div>
                </span>
                <p class="prompt-heading">Search anything related to this matter</p>
                <p class="prompt-subtext">Or tap a category below to browse all records</p>
                <div class="searchable-tags">
                    <template for:each={searchableObjects} for:item="obj">
                        <button
                            key={obj.type}
                            class={obj.tagClass}
                            data-type={obj.type}
                            data-label={obj.label}
                            onclick={handleTagClick}
                        >{obj.label}</button>
                    </template>
                </div>
            </div>
        </template>

    </div>
</template>

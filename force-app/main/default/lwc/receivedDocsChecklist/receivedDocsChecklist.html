<template>

    <!-- Section header -->
    <div class="section-header" onclick={toggleSection}>
        <lightning-icon
            icon-name={chevronIcon}
            size="xx-small"
            class="slds-m-right_x-small">
        </lightning-icon>
        <span class="slds-text-heading_small">{sectionLabel}</span>
    </div>

    <!-- Section body -->
    <template if:true={isOpen}>
        <div class="slds-p-around_medium">

            <!-- Edit mode -->
            <template if:true={isEditing}>
                <lightning-record-edit-form
                    record-id={recordId}
                    object-api-name={objectApiName}
                    onsuccess={handleSuccess}
                    onload={handleFormLoad}>
                    <template if:true={isFormLoading}>
                        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                    </template>
                    <lightning-input-field field-name={fieldApiName}></lightning-input-field>
                    <div class="slds-m-top_small slds-grid slds-grid_align-end">
                        <lightning-button label="Cancel" onclick={handleCancel} class="slds-m-right_x-small"></lightning-button>
                        <lightning-button type="submit" label="Save" variant="brand"></lightning-button>
                    </div>
                </lightning-record-edit-form>
            </template>

            <!-- Display mode -->
            <template if:false={isEditing}>
                <div class="slds-grid slds-grid_align-end slds-m-bottom_xx-small">
                    <lightning-button-icon
                        icon-name="utility:edit"
                        variant="bare"
                        alternative-text="Edit"
                        onclick={handleEdit}>
                    </lightning-button-icon>
                </div>
                <div class="slds-grid slds-gutters_small">

                    <!-- Outstanding Docs (left) -->
                    <div class="slds-col slds-size_1-of-2 slds-form-element slds-form-element_stacked">
                        <span class="slds-form-element__label">Outstanding Docs</span>
                        <div class="slds-form-element__control slds-m-top_xx-small">
                            <template for:each={outstandingItems} for:item="item">
                                <div key={item} class="slds-m-bottom_xx-small">
                                    <lightning-input type="checkbox" label={item} disabled></lightning-input>
                                </div>
                            </template>
                            <template if:false={hasOutstanding}>
                                <span class="slds-text-color_weak">—</span>
                            </template>
                        </div>
                    </div>

                    <!-- Received Docs (right) -->
                    <div class="slds-col slds-size_1-of-2 slds-form-element slds-form-element_stacked">
                        <span class="slds-form-element__label">Received Docs</span>
                        <div class="slds-form-element__control slds-m-top_xx-small">
                            <template for:each={receivedItems} for:item="item">
                                <div key={item} class="slds-m-bottom_xx-small">
                                    <lightning-input type="checkbox" label={item} checked disabled></lightning-input>
                                </div>
                            </template>
                            <template if:false={hasReceived}>
                                <span class="slds-text-color_weak">—</span>
                            </template>
                        </div>
                    </div>

                </div>
            </template>

        </div>
    </template>

</template>

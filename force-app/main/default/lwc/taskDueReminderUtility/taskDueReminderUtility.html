<template>
    <div class="reminder-container">
        <div class="reminder-tabs" role="tablist">
            <button
                type="button"
                role="tab"
                aria-selected={isAssignedToMeTab}
                class={assignedToMeTabClass}
                data-tab="assignedToMe"
                onclick={handleTabClick}
            >Assigned to Me<span class="tab-count">{assignedToMeCount}</span></button>
            <button
                type="button"
                role="tab"
                aria-selected={isAssignedByMeTab}
                class={assignedByMeTabClass}
                data-tab="assignedByMe"
                onclick={handleTabClick}
            >Assigned by Me<span class="tab-count">{assignedByMeCount}</span></button>
            <button
                type="button"
                role="tab"
                aria-selected={isWaitingTab}
                class={waitingTabClass}
                data-tab="waiting"
                onclick={handleTabClick}
            >Waiting<span class="tab-count">{waitingCount}</span></button>
        </div>
        <template if:true={hasTasks}>
            <div class="panel-toolbar">
                <template if:true={hasTodayProgress}>
                    <div class="progress-summary">
                        <div class="progress-ring" style={progressRingStyle}>
                            <div class="progress-ring-inner">
                                <span class="progress-ring-text">{todayProgressPercent}%</span>
                            </div>
                        </div>
                        <span class="progress-label">{todayProgressLabel} done today</span>
                    </div>
                </template>
                <template if:true={waitingSummaryLabel}>
                    <span class="waiting-summary-label">{waitingSummaryLabel}</span>
                </template>
                <button type="button" class="toggle-all-button" onclick={handleToggleAll}>{collapseAllLabel}</button>
            </div>
            <template for:each={groups} for:item="group">
                <div key={group.key} class="reminder-section">
                    <div
                        class={group.headerClass}
                        data-key={group.key}
                        onclick={toggleSection}
                        onkeydown={handleSectionHeaderKeydown}
                        role="button"
                        tabindex="0"
                        aria-expanded={group.expanded}>
                        <lightning-icon
                            icon-name={group.chevron}
                            size="xx-small"
                            class="reminder-chevron"
                        ></lightning-icon>
                        <lightning-icon icon-name={group.icon} size="x-small" variant={group.iconVariant}></lightning-icon>
                        <span class="reminder-title">{group.label}</span>
                        <span class="reminder-count">{group.count}</span>
                    </div>
                    <template if:true={group.expanded}>
                        <ul class="reminder-list">
                            <template for:each={group.tasks} for:item="task">
                                <li key={task.Id} class={task.itemClass} data-id={task.Id} onclick={handleOpenTask}>
                                    <div class="reminder-item-row">
                                        <div class="reminder-item-main">
                                            <div class="reminder-item-top">
                                                <template if:true={task.Priority}>
                                                    <span class={task.priorityClass}>{task.Priority}</span>
                                                </template>
                                                <span class="reminder-subject">{task.Subject}</span>
                                                <template if:true={task.isWaiting}>
                                                    <span class="waiting-pill">Waiting</span>
                                                </template>
                                            </div>
                                            <div class="reminder-item-meta">
                                                <template if:true={task.MatterName}>
                                                    <button
                                                        type="button"
                                                        class="reminder-matter-link"
                                                        data-matter-id={task.MatterId}
                                                        onclick={handleOpenMatter}
                                                    >{task.MatterName}</button>
                                                </template>
                                                <template if:true={task.dueLabel}>
                                                    <span class="reminder-due">{task.dueLabel}</span>
                                                </template>
                                            </div>
                                            <template if:true={task.waitingOnLabel}>
                                                <div class="reminder-waiting-on">{task.waitingOnLabel}</div>
                                            </template>
                                        </div>
                                        <div class="reminder-item-side">
                                            <template if:true={task.showActions}>
                                                <lightning-button-icon
                                                    icon-name="utility:check"
                                                    variant="success"
                                                    size="small"
                                                    alternative-text="Complete task"
                                                    title="Mark complete"
                                                    data-id={task.Id}
                                                    onclick={handleComplete}
                                                ></lightning-button-icon>
                                                <button
                                                    type="button"
                                                    class="snooze-pill"
                                                    title="Snooze (remind me again later)"
                                                    data-id={task.Id}
                                                    onclick={toggleSnoozeMenu}
                                                >Snooze <span class="snooze-caret">{task.snoozeCaret}</span></button>
                                            </template>
                                            <template if:false={task.showActions}>
                                                <template if:true={task.showOwnerPill}>
                                                    <span class="assignee-pill">{task.OwnerName}</span>
                                                </template>
                                                <template if:true={task.Status}>
                                                    <span class="status-pill">{task.Status}</span>
                                                </template>
                                            </template>
                                        </div>
                                    </div>
                                    <template if:true={task.isSnoozeMenuOpen}>
                                        <div class="snooze-options">
                                            <template for:each={task.snoozeOptions} for:item="option">
                                                <button
                                                    type="button"
                                                    key={option.duration}
                                                    class="snooze-option-pill"
                                                    data-id={task.Id}
                                                    data-duration={option.duration}
                                                    data-label={option.label}
                                                    onclick={handleSnooze}
                                                >{option.label}</button>
                                            </template>
                                        </div>
                                    </template>
                                </li>
                            </template>
                        </ul>
                    </template>
                </div>
            </template>
        </template>

        <template if:false={hasTasks}>
            <div class="reminder-empty">
                <lightning-icon icon-name="utility:success" size="small" variant="success"></lightning-icon>
                <span class="reminder-empty-title">{emptyStateTitle}</span>
                <template if:true={hasCompletedToday}>
                    <span class="reminder-empty-subtitle">{completedTodayMessage}</span>
                </template>
            </div>
        </template>
    </div>
</template>

<template>
    <lightning-modal-header label="New Task"></lightning-modal-header>

    <lightning-modal-body onclick={handleModalOutsideSearchClick}>

        <!-- Subject -->
        <lightning-input
            label="Subject"
            required
            value={subject}
            onchange={handleSubject}>
        </lightning-input>

        <!-- Selected Assignee -->
        <template if:true={hasSelectedAssignee}>
            <div class="slds-box slds-m-top_medium">
                <div class="slds-text-title_caps slds-m-bottom_x-small">
                    Assignee
                </div>

                <template for:each={selectedUsers} for:item="u">
                    <lightning-pill
                        key={u.id}
                        label={u.name}
                        data-id={u.id}
                        onremove={removeUser}>
                    </lightning-pill>
                </template>
            </div>
        </template>

        <!-- Assignee Search -->
        <div class="slds-m-top_large">
            <lightning-tabset>

                <lightning-tab label="People">
                    <div class="search-container" onclick={handleSearchAreaClick}>
                        <lightning-input
                            data-id="user-search-input"
                            type="search"
                            label="Search Users"
                            value={userSearchKeyword}
                            onfocus={handleUserFocus}
                            onclick={handleUserClick}
                            onblur={handleUserBlur}
                            onkeyup={handleUserSearch}
                            onkeydown={handleUserKeydown}>
                        </lightning-input>

                        <template if:true={hasUserResults}>
                            <div class="search-dropdown" onmousedown={handleSearchDropdownMouseDown}>
                                <template for:each={userResults} for:item="u">
                                    <button
                                        key={u.Id}
                                        type="button"
                                        class="dropdown-item"
                                        data-id={u.Id}
                                        onclick={addUser}>
                                        {u.Name}
                                    </button>
                                </template>
                            </div>
                        </template>
                    </div>
                </lightning-tab>

                <lightning-tab label="Groups">
                    <div class="search-container" onclick={handleSearchAreaClick}>
                        <lightning-input
                            data-id="group-search-input"
                            type="search"
                            label="Search Groups"
                            value={groupSearchKeyword}
                            onfocus={handleGroupFocus}
                            onclick={handleGroupClick}
                            onblur={handleGroupBlur}
                            onkeyup={handleGroupSearch}
                            onkeydown={handleGroupKeydown}>
                        </lightning-input>

                        <template if:true={hasGroupResults}>
                            <div class="search-dropdown" onmousedown={handleSearchDropdownMouseDown}>
                                <template for:each={groupResults} for:item="g">
                                    <div key={g.Id} class="slds-m-top_small">
                                        <button
                                            type="button"
                                            class="result-row slds-grid slds-grid_align-spread slds-p-around_small"
                                            data-id={g.Id}
                                            onclick={toggleGroupMembers}>
                                            <span class="result-row__label">{g.Name}</span>
                                            <span class="result-row__action">{g.memberToggleLabel}</span>
                                        </button>

                                        <template if:true={g.isExpanded}>
                                            <div class="group-members slds-m-top_x-small slds-m-left_medium">
                                                <template if:true={g.isLoadingMembers}>
                                                    <lightning-spinner
                                                        size="small"
                                                        alternative-text="Loading group users">
                                                    </lightning-spinner>
                                                </template>

                                                <template for:each={g.members} for:item="member">
                                                    <button
                                                        key={member.Id}
                                                        type="button"
                                                        class="member-row slds-grid slds-grid_align-spread slds-p-around_x-small"
                                                        data-id={member.Id}
                                                        onclick={addUserFromGroup}
                                                        disabled={member.isSelected}>
                                                        <span>{member.Name}</span>
                                                        <span class="result-row__action">{member.actionLabel}</span>
                                                    </button>
                                                </template>

                                                <template if:true={g.showNoMembers}>
                                                    <div class="slds-text-body_small slds-text-color_weak slds-p-vertical_x-small">
                                                        No users found in this group.
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </lightning-tab>

            </lightning-tabset>
        </div>

        <!-- Status + Priority -->
        <div class="slds-grid slds-gutters slds-m-top_large">
            <div class="slds-col slds-size_1-of-2">
                <lightning-combobox
                    label="Status"
                    value={status}
                    options={statusOptions}
                    onchange={handleStatus}>
                </lightning-combobox>
            </div>

            <div class="slds-col slds-size_1-of-2">
                <lightning-combobox
                    label="Priority"
                    value={priority}
                    options={priorityOptions}
                    onchange={handlePriority}>
                </lightning-combobox>
            </div>
        </div>

        <!-- Task Subtype -->
        <lightning-combobox
            class="slds-m-top_medium"
            label="Task Subtype"
            value={taskSubtype}
            options={taskSubtypeOptions}
            onchange={handleTaskSubtype}>
        </lightning-combobox>

        <template if:true={showTaskSubtypeIfOther}>
            <lightning-input
                data-id="taskSubtypeIfOther"
                class="slds-m-top_medium"
                label="Task Subtype (If Other)"
                required
                message-when-value-missing="Enter a subtype when Task Subtype is Other."
                value={taskSubtypeIfOther}
                onchange={handleTaskSubtypeIfOther}>
            </lightning-input>
        </template>

        <!-- Description -->
        <lightning-textarea
            class="slds-m-top_medium"
            label="Description"
            value={description}
            onchange={handleDescription}>
        </lightning-textarea>

        <!-- Due Date + Reminders -->
        <div class="slds-grid slds-gutters slds-m-top_large">

            <div class="slds-col slds-size_1-of-2">
                <lightning-input
                    type="date"
                    label="Due Date"
                    value={activityDate}
                    onchange={handleDueDate}>
                </lightning-input>
            </div>

            <div class="slds-col slds-size_1-of-2">
                <lightning-dual-listbox
                    name="reminders"
                    label="Reminders"
                    source-label="Available"
                    selected-label="Selected"
                    options={reminderOptions}
                    value={selectedReminderTypes}
                    onchange={handleReminderChange}
                    disabled={isReminderDisabled}>
                </lightning-dual-listbox>
            </div>

        </div>

        <!-- Internal / External -->
        <lightning-combobox
            class="slds-m-top_medium"
            label="Internal / External"
            value={internalExternalType}
            options={internalExternalTypeOptions}
            onchange={handleInternalExternalType}>
        </lightning-combobox>

        <!-- Related To -->
        <lightning-input
            class="slds-m-top_medium"
            label="Related To"
            value={recordName}
            disabled>
        </lightning-input>

    </lightning-modal-body>

    <lightning-modal-footer onclick={handleModalOutsideSearchClick}>
        <lightning-button
            label="Cancel"
            onclick={handleCancel}>
        </lightning-button>

        <lightning-button
            label="Save &amp; New"
            disabled={isSaveDisabled}
            onclick={saveAndNew}>
        </lightning-button>

        <lightning-button
            variant="brand"
            label="Save"
            disabled={isSaveDisabled}
            onclick={save}>
        </lightning-button>
    </lightning-modal-footer>
</template>

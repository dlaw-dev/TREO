<template>
    <lightning-modal-header label="New Task"></lightning-modal-header>

    <lightning-modal-body onclick={handleModalOutsideSearchClick}>

        <div class="modal-tabs" role="tablist">
            <button
                type="button"
                role="tab"
                aria-selected={isNewTaskTab}
                class={newTaskTabClass}
                data-tab="newTask"
                onclick={handleTabClick}>New Task</button>
            <button
                type="button"
                role="tab"
                aria-selected={isUseTemplateTab}
                class={useTemplateTabClass}
                data-tab="useTemplate"
                onclick={handleTabClick}>Use Task Template</button>
        </div>

        <template if:true={isNewTaskTab}>
        <div class="slds-grid slds-wrap slds-gutters">
            <div class="slds-col slds-size_1-of-3">
                <!-- Subject -->
                <div class="search-container" data-id="subject-search-container" onclick={handleSearchAreaClick}>
                    <lightning-input
                        data-id="subject-input"
                        label="Subject"
                        required
                        autocomplete="off"
                        value={subject}
                        onfocus={handleSubjectFocus}
                        onblur={handleSubjectBlur}
                        onchange={handleSubject}
                        onkeyup={handleSubject}>
                    </lightning-input>

                    <template if:true={hasSubjectSuggestions}>
                        <div class="search-dropdown" style={subjectDropdownStyle} onmousedown={handleSubjectDropdownMouseDown}>
                            <template for:each={filteredSubjectSuggestions} for:item="s">
                                <button
                                    key={s}
                                    type="button"
                                    class="dropdown-item"
                                    data-value={s}
                                    onclick={selectSubjectSuggestion}>
                                    {s}
                                </button>
                            </template>
                        </div>
                    </template>
                </div>
            </div>

            <div class="slds-col slds-size_1-of-3">
                <!-- Selected Assignee -->
                <template if:true={hasSelectedAssignee}>
                    <div class="slds-form-element__label slds-m-bottom_x-small">
                        Assignee <abbr class="slds-required" title="required">*</abbr>
                    </div>

                    <template for:each={selectedUsers} for:item="u">
                        <lightning-pill
                            key={u.id}
                            label={u.name}
                            data-id={u.id}
                            onremove={removeUser}>
                        </lightning-pill>
                    </template>
                </template>

                <!-- Assignee Search -->
                <template if:false={hasSelectedAssignee}>
                    <div class="search-container" data-id="assignee-search-container" onclick={handleSearchAreaClick}>
                        <lightning-input
                            data-id="user-search-input"
                            type="search"
                            label="Assignee"
                            required
                            value={userSearchKeyword}
                            onfocus={handleUserFocus}
                            onclick={handleUserClick}
                            onblur={handleUserBlur}
                            onkeyup={handleUserSearch}
                            onkeydown={handleUserKeydown}>
                        </lightning-input>

                        <template if:true={hasUserResults}>
                            <div class="search-dropdown" style={assigneeDropdownStyle} onmousedown={handleSearchDropdownMouseDown}>
                                <template for:each={userResults} for:item="u">
                                    <button
                                        key={u.Id}
                                        type="button"
                                        class="dropdown-item"
                                        data-id={u.Id}
                                        onclick={addUser}>
                                        {u.Name}
                                    </button>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <div class="slds-col slds-size_1-of-3">
                <!-- Due Date -->
                <lightning-input
                    data-id="dueDate"
                    type="date"
                    label="Due Date"
                    required
                    message-when-value-missing="Please select a Due Date."
                    value={activityDate}
                    onchange={handleDueDate}>
                </lightning-input>
            </div>
        </div>

        <!-- More Details -->
        <div class="more-details-section slds-m-top_medium">
            <button
                type="button"
                class="more-details-toggle"
                onclick={toggleMoreDetails}
                aria-expanded={isMoreDetailsOpen}>
                <lightning-icon icon-name={moreDetailsIcon} size="xx-small"></lightning-icon>
                <span>More Details</span>
            </button>

            <template if:true={isMoreDetailsOpen}>
                <div class="more-details-content slds-m-top_small">

                    <!-- Description -->
                    <lightning-textarea
                        label="Description"
                        value={description}
                        onchange={handleDescription}>
                    </lightning-textarea>

                    <!-- Priority -->
                    <lightning-combobox
                        class="slds-m-top_medium"
                        label="Priority"
                        value={priority}
                        options={priorityOptions}
                        onchange={handlePriority}>
                    </lightning-combobox>

                    <!-- Reminder Set -->
                    <lightning-input
                        class="slds-m-top_medium"
                        type="checkbox"
                        label="Reminder Set"
                        checked={isReminderSet}
                        disabled={isReminderDisabled}
                        onchange={handleReminderSet}>
                    </lightning-input>

                    <!-- Reminder Picker -->
                    <template if:true={isReminderSet}>
                        <div class="slds-form-element__label slds-m-top_medium slds-m-bottom_x-small">Reminders</div>
                        <div class="reminder-options-grid">
                            <div class="reminder-options-column">
                                <template for:each={reminderOptionColumnLeft} for:item="option">
                                    <lightning-input
                                        key={option.value}
                                        type="checkbox"
                                        label={option.label}
                                        checked={option.checked}
                                        data-value={option.value}
                                        onchange={handleReminderOptionToggle}>
                                    </lightning-input>
                                </template>
                            </div>
                            <div class="reminder-options-column">
                                <template for:each={reminderOptionColumnRight} for:item="option">
                                    <lightning-input
                                        key={option.value}
                                        type="checkbox"
                                        label={option.label}
                                        checked={option.checked}
                                        data-value={option.value}
                                        onchange={handleReminderOptionToggle}>
                                    </lightning-input>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Related To -->
                    <lightning-input
                        class="slds-m-top_medium"
                        label="Related To"
                        value={recordName}
                        disabled>
                    </lightning-input>
                </div>
            </template>
        </div>
        </template>

        <template if:true={isUseTemplateTab}>
            <div class="slds-form-element__label slds-m-bottom_x-small">Choose a template</div>

            <template if:true={isTemplatesLoading}>
                <lightning-spinner alternative-text="Loading templates" size="small"></lightning-spinner>
            </template>

            <template if:true={hasTemplatesError}>
                <p class="template-error">{templatesErrorMessage}</p>
            </template>

            <template if:true={hasNoTemplates}>
                <p class="template-empty">No templates are available yet.</p>
            </template>

            <div class="template-card-grid">
                <template for:each={templateCards} for:item="tpl">
                    <button
                        key={tpl.id}
                        type="button"
                        class={tpl.cardClass}
                        data-id={tpl.id}
                        onclick={handleTemplateCardClick}>
                        <lightning-icon icon-name={tpl.icon} size="small" class="template-card-icon"></lightning-icon>
                        <div class="template-card-text">
                            <span class="template-card-name">{tpl.name}</span>
                            <span class="template-card-steps">{tpl.stepLabel}</span>
                        </div>
                    </button>
                </template>
            </div>

            <template if:true={hasSelectedTemplate}>
                <template if:true={isTemplateItemsLoading}>
                    <lightning-spinner alternative-text="Loading template steps" size="small" class="slds-m-top_medium"></lightning-spinner>
                </template>

                <template if:true={hasTemplateItemsError}>
                    <p class="template-error slds-m-top_medium">{templateItemsErrorMessage}</p>
                </template>

                <div class="template-timeline slds-m-top_medium">
                    <template for:each={templateItemRows} for:item="item">
                        <div key={item.id} class="timeline-step">
                            <div class="timeline-marker">
                                <span class="timeline-circle">{item.displayIndex}</span>
                                <template if:false={item.isLast}>
                                    <span class="timeline-line"></span>
                                </template>
                            </div>
                            <div class="timeline-content">
                                <div class="timeline-subject">{item.subject}</div>
                                <template if:true={item.description}>
                                    <div class="timeline-description">{item.description}</div>
                                </template>
                                <div class="timeline-pills">
                                    <span class={item.timingPillClass}>{item.timingLabel}</span>
                                    <span class={item.assigneePillClass}>{item.assigneeText}</span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <template if:true={isApplyingTemplate}>
                <div class="slds-m-top_medium">
                    <lightning-spinner alternative-text="Applying template" size="small"></lightning-spinner>
                </div>
            </template>
        </template>

    </lightning-modal-body>

    <lightning-modal-footer onclick={handleModalOutsideSearchClick}>
        <lightning-button
            label="Cancel"
            onclick={handleCancel}>
        </lightning-button>

        <template if:true={isNewTaskTab}>
            <lightning-button
                label="Save &amp; New"
                disabled={isSaveDisabled}
                onclick={saveAndNew}>
            </lightning-button>

            <lightning-button
                variant="brand"
                label="Save"
                disabled={isSaveDisabled}
                onclick={save}>
            </lightning-button>
        </template>

        <template if:true={isUseTemplateTab}>
            <lightning-button
                variant="brand"
                label="Create Tasks"
                disabled={isApplyTemplateDisabled}
                onclick={applyTemplate}>
            </lightning-button>
        </template>
    </lightning-modal-footer>
</template>

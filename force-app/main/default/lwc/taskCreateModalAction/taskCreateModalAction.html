<template>
    <lightning-modal-header label="New Task"></lightning-modal-header>

    <lightning-modal-body onclick={handleModalOutsideSearchClick}>

        <!-- Subject -->
        <lightning-input
            label="Subject"
            required
            autocomplete="off"
            value={subject}
            onchange={handleSubject}>
        </lightning-input>

        <!-- Description -->
        <lightning-textarea
            label="Description"
            value={description}
            onchange={handleDescription}>
        </lightning-textarea>

        <!-- Selected Assignee -->
        <template if:true={hasSelectedAssignee}>
            <div class="slds-box slds-m-top_medium">
                <div class="slds-text-title_caps slds-m-bottom_x-small">
                    Assignee
                </div>

                <template for:each={selectedUsers} for:item="u">
                    <lightning-pill
                        key={u.id}
                        label={u.name}
                        data-id={u.id}
                        onremove={removeUser}>
                    </lightning-pill>
                </template>
            </div>
        </template>

        <!-- Assignee Search -->
        <template if:false={hasSelectedAssignee}>
            <div class="search-container slds-m-top_large" onclick={handleSearchAreaClick}>
                <lightning-input
                    data-id="user-search-input"
                    type="search"
                    label="Search Assignee"
                    value={userSearchKeyword}
                    onfocus={handleUserFocus}
                    onclick={handleUserClick}
                    onblur={handleUserBlur}
                    onkeyup={handleUserSearch}
                    onkeydown={handleUserKeydown}>
                </lightning-input>

                <template if:true={hasUserResults}>
                    <div class="search-dropdown" onmousedown={handleSearchDropdownMouseDown}>
                        <template for:each={userResults} for:item="u">
                            <button
                                key={u.Id}
                                type="button"
                                class="dropdown-item"
                                data-id={u.Id}
                                onclick={addUser}>
                                {u.Name}
                            </button>
                        </template>
                    </div>
                </template>
            </div>
        </template>

        <!-- Priority -->
        <lightning-combobox
            class="slds-m-top_large"
            label="Priority"
            value={priority}
            options={priorityOptions}
            onchange={handlePriority}>
        </lightning-combobox>

        <!-- Task Subtype -->
        <lightning-combobox
            class="slds-m-top_medium"
            label="Task Subtype"
            value={taskSubtype}
            options={taskSubtypeOptions}
            onchange={handleTaskSubtype}>
        </lightning-combobox>

        <template if:true={showTaskSubtypeIfOther}>
            <lightning-input
                data-id="taskSubtypeIfOther"
                class="slds-m-top_medium"
                label="Task Subtype (If Other)"
                required
                message-when-value-missing="Enter a subtype when Task Subtype is Other."
                value={taskSubtypeIfOther}
                onchange={handleTaskSubtypeIfOther}>
            </lightning-input>
        </template>

        <!-- Due Date -->
        <lightning-input
            class="slds-m-top_medium"
            type="date"
            label="Due Date"
            value={activityDate}
            onchange={handleDueDate}>
        </lightning-input>

        <!-- Reminder Set -->
        <lightning-input
            class="slds-m-top_medium"
            type="checkbox"
            label="Reminder Set"
            checked={isReminderSet}
            disabled={isReminderDisabled}
            onchange={handleReminderSet}>
        </lightning-input>

        <!-- Reminder Picker -->
        <template if:true={isReminderSet}>
            <lightning-checkbox-group
                class="slds-m-top_medium"
                name="reminders"
                label="Reminders"
                options={reminderOptions}
                value={selectedReminderTypes}
                onchange={handleReminderChange}>
            </lightning-checkbox-group>
        </template>

        <!-- Internal / External -->
        <lightning-combobox
            class="slds-m-top_medium"
            label="Internal / External"
            value={internalExternalType}
            options={internalExternalTypeOptions}
            onchange={handleInternalExternalType}>
        </lightning-combobox>

        <!-- Related To -->
        <lightning-input
            class="slds-m-top_medium"
            label="Related To"
            value={recordName}
            disabled>
        </lightning-input>

    </lightning-modal-body>

    <lightning-modal-footer onclick={handleModalOutsideSearchClick}>
        <lightning-button
            label="Cancel"
            onclick={handleCancel}>
        </lightning-button>

        <lightning-button
            label="Save &amp; New"
            disabled={isSaveDisabled}
            onclick={saveAndNew}>
        </lightning-button>

        <lightning-button
            variant="brand"
            label="Save"
            disabled={isSaveDisabled}
            onclick={save}>
        </lightning-button>
    </lightning-modal-footer>
</template>
